workflows:
  ios-unsigned-ipa:
    name: iOS Unsigned IPA
    environment:
      xcode: latest
      cocoapods: default
      vars:
        PACKAGE_NAME: "com.evilcrow.rf2controller"
    scripts:
      - name: Generate missing iOS project files
        script: |
          cd mobile_app
          flutter create --platforms=ios .
      - name: Add BLE permissions to Info.plist
        script: |
          cd mobile_app/ios/Runner
          /usr/libexec/PlistBuddy -c "Add :NSBluetoothAlwaysUsageDescription string 'Bluetooth is required to connect to EvilCrow RF devices for remote control, signal scanning, and firmware updates.'" Info.plist 2>/dev/null
          /usr/libexec/PlistBuddy -c "Set :NSBluetoothAlwaysUsageDescription 'Bluetooth is required to connect to EvilCrow RF devices for remote control, signal scanning, and firmware updates.'" Info.plist 2>/dev/null
          /usr/libexec/PlistBuddy -c "Add :NSBluetoothPeripheralUsageDescription string 'Bluetooth is required to communicate with EvilCrow RF hardware.'" Info.plist 2>/dev/null
          /usr/libexec/PlistBuddy -c "Set :NSBluetoothPeripheralUsageDescription 'Bluetooth is required to communicate with EvilCrow RF hardware.'" Info.plist 2>/dev/null
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Location access is required for iOS to discover nearby BLE devices.'" Info.plist 2>/dev/null
          /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 'Location access is required for iOS to discover nearby BLE devices.'" Info.plist 2>/dev/null
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" Info.plist 2>/dev/null
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string bluetooth-central" Info.plist 2>/dev/null
          echo "--- Info.plist updated ---"
          /usr/libexec/PlistBuddy -c "Print" Info.plist | grep -E "Bluetooth|Location|Background"
        script: |
          cd mobile_app
          flutter pub get
      - name: Build unsigned iOS app
        script: |
          cd mobile_app
          flutter build ios --release --no-codesign
      - name: Package IPA
        script: |
          cd mobile_app
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir Payload
          cp -R Runner.app Payload/
          zip -r ../ipa/EvilCrowRF.ipa Payload
          echo "--- IPA created ---"
          ls -la ../ipa/
    artifacts:
      - mobile_app/build/ios/ipa/*.ipa

