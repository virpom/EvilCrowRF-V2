name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile_app/**'
      - '.github/workflows/build-ios.yml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate missing iOS project files
        working-directory: mobile_app
        run: flutter create --platforms=ios .

      - name: Configure iOS permissions
        run: |
          PLIST=mobile_app/ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSBluetoothAlwaysUsageDescription string 'Bluetooth required to connect to EvilCrow RF devices.'" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSBluetoothAlwaysUsageDescription 'Bluetooth required to connect to EvilCrow RF devices.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSBluetoothPeripheralUsageDescription string 'Bluetooth required to communicate with EvilCrow RF hardware.'" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSBluetoothPeripheralUsageDescription 'Bluetooth required to communicate with EvilCrow RF hardware.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 'Location access required for iOS to discover nearby BLE devices.'" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 'Location access required for iOS to discover nearby BLE devices.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes array" "$PLIST" 2>/dev/null
          /usr/libexec/PlistBuddy -c "Add :UIBackgroundModes:0 string bluetooth-central" "$PLIST" 2>/dev/null
          /usr/libexec/PlistBuddy -c "Add :LSApplicationQueriesSchemes array" "$PLIST" 2>/dev/null
          /usr/libexec/PlistBuddy -c "Add :LSApplicationQueriesSchemes:0 string https" "$PLIST" 2>/dev/null
          /usr/libexec/PlistBuddy -c "Add :LSApplicationQueriesSchemes:1 string http" "$PLIST" 2>/dev/null

      - name: Get Flutter packages
        working-directory: mobile_app
        run: flutter pub get

      - name: Build unsigned iOS app
        working-directory: mobile_app
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        working-directory: mobile_app
        run: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir Payload
          cp -R Runner.app Payload/
          zip -r ../ipa/EvilCrowRF.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: EvilCrowRF-iOS
          path: mobile_app/build/ios/ipa/EvilCrowRF.ipa
          retention-days: 30
